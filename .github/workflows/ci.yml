# .github/workflows/ci.yml
# Backend CI pipeline - runs on every push to the main branch and on pull requests targeting the main branch

# Checks TypeScript, linting, and that the build compiles cleanly.

name: CI - Backend checks

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    typecheck:
        name: TypeScript check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4t
            - uses: actions/setup-node@v4
              with:
                node-version: "20"
                cache: "npm"
            - run: npm ci
            - run: npx prisma generate
                # Prisma must generate the client before TypeScript
                # can type-check code that imports from @prisma/client
            - run: npx tsc --noEmit

    build:
        name: Production build check
        runs-on: ubuntu-latest
        needs: typecheck
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: "20"
                cache: "npm"
            - run: npm ci
            - run: npx prisma generate
                # Prisma must generate the client before the build can compile code that imports from @prisma/client
            - run: npm run build
